paths:
  /steam/admin/accounts/{id}:
    put:
      summary: 계정 수정
      tags: [SteamAccounts]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password, email, emailPassword, emailSiteUrl]
              properties:
                username:
                  type: string
                password:
                  type: string
                email:
                  type: string
                emailPassword:
                  type: string
                emailSiteUrl:
                  type: string
      responses:
        '200':
          description: 수정된 계정 반환
        '404':
          description: 계정을 찾을 수 없음
    delete:
      summary: 계정 삭제
      tags: [SteamAccounts]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 삭제 완료
        '400':
          description: 발송 완료된 계정은 삭제할 수 없습니다.
        '404':
          description: 계정을 찾을 수 없음
