paths:
  /own/admin/users:
    get:
      summary: 회원 목록 조회
      tags: [OwnAdminUsers]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: search
          schema:
            type: string
          description: 이메일/이름/전화번호 통합 검색
        - in: query
          name: provider
          schema:
            type: string
            enum: [local, kakao, google]
          description: 가입 방식 필터
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 회원 목록 (페이지네이션)

  /own/admin/users/{id}:
    get:
      summary: 회원 상세 조회
      tags: [OwnAdminUsers]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 회원 상세 정보 (파트너, 파티, 결제, 통계 포함)
        '404':
          description: 회원을 찾을 수 없음
