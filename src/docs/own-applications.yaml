paths:
  /own/applications/my:
    get:
      summary: 내 파티 신청 목록 조회
      tags: [OwnApplications]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 신청 목록 (파티 정보, 결제 상태 포함)
        '401':
          description: 인증 필요

  /own/applications/{id}/credentials:
    get:
      summary: 파티 계정 정보 조회 (확정된 신청만)
      tags: [OwnApplications]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: 파티 신청 ID
      responses:
        '200':
          description: 복호화된 계정 정보 (accountId, accountPassword)
        '401':
          description: 인증 필요
        '403':
          description: 본인 신청이 아니거나 확정되지 않은 신청
        '404':
          description: 신청 내역 없음
