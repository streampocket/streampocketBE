paths:
  /own/products:
    get:
      summary: 상품 목록 조회 (공개)
      tags: [OwnProducts]
      responses:
        '200':
          description: 공개 상품 목록
    post:
      summary: 상품 등록
      tags: [OwnProducts]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                price:
                  type: number
                categoryId:
                  type: string
                  format: uuid
      responses:
        '201':
          description: 등록 성공
        '401':
          description: 인증 필요

  /own/products/my:
    get:
      summary: 내 상품 목록 조회
      tags: [OwnProducts]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 내가 등록한 상품 목록
        '401':
          description: 인증 필요

  /own/products/{id}:
    get:
      summary: 상품 상세 조회 (공개)
      tags: [OwnProducts]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 상품 상세
        '404':
          description: 상품 없음
    patch:
      summary: 상품 수정
      tags: [OwnProducts]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                price:
                  type: number
      responses:
        '200':
          description: 수정 성공
        '401':
          description: 인증 필요
        '404':
          description: 상품 없음
    delete:
      summary: 상품 삭제
      tags: [OwnProducts]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 삭제 성공
        '401':
          description: 인증 필요

  /own/products/{id}/close:
    patch:
      summary: 상품 마감
      tags: [OwnProducts]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 마감 처리 완료
        '401':
          description: 인증 필요

  /own/categories:
    get:
      summary: 카테고리 목록 조회 (공개)
      tags: [OwnProducts]
      responses:
        '200':
          description: 카테고리 목록
