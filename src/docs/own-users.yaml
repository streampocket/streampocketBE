paths:
  /own/users/me:
    get:
      summary: 내 정보 조회
      tags: [OwnUsers]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 사용자 정보
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      email:
                        type: string
                      name:
                        type: string
                      phone:
                        type: string
                      provider:
                        type: string
                        enum: [local, kakao, google]
        '401':
          description: 인증 필요
