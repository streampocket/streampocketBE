paths:
  /steam/admin/review-codes:
    get:
      summary: 리뷰 게임 코드 목록 조회
      tags: [ReviewCodes]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [unused, used]
        - in: query
          name: gameName
          schema:
            type: string
        - in: query
          name: dateOrder
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: 리뷰 게임 코드 목록
    post:
      summary: 리뷰 게임 코드 생성
      tags: [ReviewCodes]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [gameName, code]
              properties:
                gameName:
                  type: string
                  example: Stardew Valley
                code:
                  type: string
                  example: XXXXX-YYYYY-ZZZZZ
      responses:
        '201':
          description: 생성 완료

  /steam/admin/review-codes/batch:
    post:
      summary: 리뷰 게임 코드 일괄 등록
      tags: [ReviewCodes]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [codes]
              properties:
                gameName:
                  type: string
                  example: Stardew Valley
                codes:
                  type: array
                  items:
                    type: string
                  minItems: 1
                  maxItems: 500
                  example: ['XXXXX-YYYYY-ZZZZZ', 'AAAAA-BBBBB-CCCCC']
      responses:
        '201':
          description: 일괄 등록 완료
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      count:
                        type: integer
                        example: 5

  /steam/admin/review-codes/{id}:
    put:
      summary: 리뷰 게임 코드 수정
      tags: [ReviewCodes]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [gameName, code]
              properties:
                gameName:
                  type: string
                code:
                  type: string
      responses:
        '200':
          description: 수정 완료
    delete:
      summary: 리뷰 게임 코드 삭제
      tags: [ReviewCodes]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 삭제 완료

  /steam/admin/review-codes/{id}/status:
    patch:
      summary: 리뷰 게임 코드 상태 변경
      tags: [ReviewCodes]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [unused, used]
                usedBy:
                  type: string
                  nullable: true
      responses:
        '200':
          description: 상태 변경 완료
