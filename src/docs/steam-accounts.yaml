paths:
  /steam/admin/accounts:
    get:
      summary: 계정 목록 조회
      tags: [SteamAccounts]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: productId
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
            enum: [available, reserved, sent, disabled]
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 계정 목록

  /steam/admin/accounts/bulk:
    post:
      summary: 계정 일괄 등록
      tags: [SteamAccounts]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [productId, accounts]
              properties:
                productId:
                  type: string
                accounts:
                  type: array
                  items:
                    type: object
                    required: [username, password]
                    properties:
                      username:
                        type: string
                        example: steam_user123
                      password:
                        type: string
                        example: P@ssw0rd!
      responses:
        '201':
          description: 등록 완료 (등록된 계정 수 반환)
        '404':
          description: 상품 없음

  /steam/admin/accounts/{id}/disable:
    patch:
      summary: 계정 비활성화
      tags: [SteamAccounts]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 비활성화 완료
        '404':
          description: 계정 없음
