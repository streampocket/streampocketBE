paths:
  /steam/admin/alimtalk:
    get:
      summary: 알림톡 설정 조회
      tags: [SteamAlimtalk]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 알림톡 설정과 알리고 연동 상태

    patch:
      summary: 알림톡 설정 수정
      tags: [SteamAlimtalk]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled:
                  type: boolean
      responses:
        '200':
          description: 수정된 알림톡 설정

  /steam/admin/alimtalk/test:
    post:
      summary: 알림톡 연동 테스트 전송
      tags: [SteamAlimtalk]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 현재 발신번호로 테스트 알림톡 전송 완료
