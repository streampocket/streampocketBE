paths:
  /steam/admin/codes:
    get:
      summary: 코드 목록 조회
      tags: [SteamCodes]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: productId
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
            enum: [available, reserved, sent, disabled]
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 코드 목록

  /steam/admin/codes/bulk:
    post:
      summary: 코드 일괄 등록
      tags: [SteamCodes]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [productId, codes]
              properties:
                productId:
                  type: string
                codes:
                  type: array
                  items:
                    type: string
                  example: ['CODE-001', 'CODE-002']
      responses:
        '201':
          description: 등록 완료 (등록된 코드 수 반환)
        '404':
          description: 상품 없음

  /steam/admin/codes/{id}/disable:
    patch:
      summary: 코드 비활성화
      tags: [SteamCodes]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 비활성화 완료
        '404':
          description: 코드 없음
