paths:
  /steam/admin/email-template:
    get:
      summary: 이메일 템플릿 조회
      tags: [EmailTemplate]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 현재 이메일 템플릿
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      subject:
                        type: string
                        example: '[구매 완료] {productName}'
                      bodyTemplate:
                        type: string
                        example: "구매일시: {purchaseDate}\n상품명: {productName}\n\n[스팀 계정 정보]\n아이디: {accountUsername}\n비밀번호: {accountPassword}"

    patch:
      summary: 이메일 템플릿 수정
      description: |
        사용 가능한 플레이스홀더:
        - `{purchaseDate}` — 구매일시
        - `{productName}` — 상품명
        - `{accountUsername}` — 스팀 계정 아이디
        - `{accountPassword}` — 스팀 계정 비밀번호
        - `{description}` — 상품 설명 (없으면 '(없음)')
        - `{caution}` — 이용 주의사항 (없으면 '(없음)')
        - `{eventSection}` — 이벤트 블록 전체 (event 없으면 빈 문자열)
      tags: [EmailTemplate]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                subject:
                  type: string
                  example: '[구매 완료] {productName}'
                bodyTemplate:
                  type: string
      responses:
        '200':
          description: 수정된 템플릿 반환
