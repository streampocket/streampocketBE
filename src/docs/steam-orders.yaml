paths:
  /steam/admin/orders:
    get:
      summary: 주문 목록 조회
      tags: [SteamOrders]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, completed, manual_review, failed]
        - in: query
          name: from
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          schema:
            type: string
            format: date-time
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 주문 목록

  /steam/admin/orders/{id}:
    get:
      summary: 주문 상세 조회
      tags: [SteamOrders]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 주문 상세 (EmailLog 이력 포함)
        '404':
          description: 주문 없음

  /steam/admin/orders/{id}/retry:
    post:
      summary: 실패/수동검토 주문 재시도
      tags: [SteamOrders]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 재시도 완료
        '400':
          description: 재시도 불가 상태
        '404':
          description: 주문 없음
